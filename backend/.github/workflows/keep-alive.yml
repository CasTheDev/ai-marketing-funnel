name: Keep Render Backend Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render root endpoint
        run: |
          curl -L --max-time 70 https://ai-marketing-funnel.onrender.com/ || true

      - name: Ping Render dashboard endpoint
        run: |
          curl -L --max-time 70 https://ai-marketing-funnel.onrender.com/dashboard || true